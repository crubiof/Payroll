<!DOCTYPE html>

<title>Payroll Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#f0f2f7;display:flex;height:100vh;overflow:hidden;font-size:13px;color:#1B2A4A}
#sb{width:205px;background:#1B2A4A;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid #243558}
.sb-logo h1{color:#fff;font-size:13px;font-weight:600;line-height:1.4}
.sb-logo p{color:#4A6090;font-size:10px;margin-top:2px}
.sb-sect{padding:10px 8px 4px}
.sb-lbl{color:#3D5580;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:0 8px 5px;display:block}
.nav{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;color:#6B82A8;font-size:12px;margin-bottom:1px;transition:all .15s;white-space:nowrap}
.nav:hover{background:#243558;color:#C8D8F0}

.sb-footer{margin-top:auto;padding:12px;border-top:1px solid #243558}
.sb-period{background:#243558;border-radius:8px;padding:10px 12px}
.sb-period label{color:#5A7099;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px}
.sb-period select{width:100%;background:#1B2A4A;border:1px solid #3D5580;border-radius:4px;color:#C8D8F0;font-size:12px;padding:5px 8px;cursor:pointer;outline:none}
#mn{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tb{background:#fff;border-bottom:1px solid #E0E6F0;padding:0 22px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-l{display:flex;align-items:center;gap:10px}
.tb-title{font-size:15px;font-weight:600;color:#1B2A4A}
.tb-sub{font-size:11px;color:#8BA3C7;background:#EEF1F8;padding:2px 8px;border-radius:10px}
.tb-r{display:flex;align-items:center;gap:8px}
#ct{flex:1;overflow-y:auto;padding:22px}
.sec{display:none}
.sec.on{display:block}
.btn{padding:6px 13px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:5px;line-height:1.4}

.btn-o{background:#fff;color:#1B2A4A;border:1px solid #C5D0E0}

.btn-warn{background:#FFF3E0;color:#E65100;border:1px solid #FFCC80}
.btn-sm{padding:3px 8px;font-size:11px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kc{background:#fff;border:1px solid #E0E6F0;border-radius:10px;padding:14px 16px}
.kc.warn{border-color:#F7C1C1;background:#FEF3F2}
.kc.ok{border-color:#A5D6A7;background:#E8F5E9}
.kc.gold{border-color:#F5C97D;background:#FFF8E7}
.kl{font-size:10px;color:#6B82A8;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.kv{font-size:22px;font-weight:700;color:#1B2A4A;line-height:1}
.kc.warn .kv{color:#A32D2D}
.kc.ok .kv{color:#2E7D32}
.kc.gold .kv{color:#8B5E00}
.ks{font-size:11px;color:#8BA3C7;margin-top:3px}
.card{background:#fff;border:1px solid #E0E6F0;border-radius:10px;padding:18px;margin-bottom:16px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.card-ti{font-size:13px;font-weight:600;color:#1B2A4A}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#F4F6FB;color:#6B82A8;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:8px 11px;text-align:left;border-bottom:1px solid #E0E6F0;white-space:nowrap}
th.sortable{cursor:pointer;user-select:none}
th.sortable:hover{background:#EEF1F8;color:#1B2A4A}
th.sortable .si{color:#B8C5D8;margin-left:3px;font-size:10px}

td{padding:7px 11px;border-bottom:1px solid #F0F3F8;color:#1B2A4A;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFBFE}
tr.ov td{background:#FEF3F2}
tr.ed td{background:#F0F8FF}

tfoot td{font-weight:600;background:#F4F6FB;border-top:2px solid #E0E6F0;border-bottom:none}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.b-ft{background:#EEF1F8;color:#1B2A4A}
.b-pt{background:#F1EFE8;color:#5F5E5A}
.b-reg{background:#E8F5E9;color:#1B5E20}
.b-15{background:#FFF3E0;color:#E65100}
.b-2x{background:#FCE4EC;color:#880E4F}
.tog{position:relative;display:inline-block;width:32px;height:17px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.tog .sl{position:absolute;cursor:pointer;inset:0;background:#C8D0DC;border-radius:17px;transition:.2s}
.tog .sl::before{content:'';position:absolute;width:11px;height:11px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.tog input:checked+.sl{background:#1B2A4A}
.tog.red input:checked+.sl{background:#C62828}

.hm-wrap{overflow-x:auto;padding-bottom:4px}
.hm-table{border-collapse:separate;border-spacing:3px;font-size:10px}
.hm-table th{background:none;border:none;font-size:9px;padding:1px 3px;text-align:center;color:#8BA3C7;position:static;white-space:nowrap;font-weight:500}
.hm-table th.rotated{writing-mode:vertical-rl;transform:rotate(180deg);height:90px;vertical-align:bottom;text-overflow:ellipsis;max-width:18px}
.hm-table td{padding:0;border:none;background:none}
.hm-cell{width:24px;height:22px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:500;cursor:default}
.hm-cell.empty{background:#F0F3F8;color:transparent}

.bar-wrap{margin-top:6px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-label{font-size:11px;color:#1B2A4A;width:170px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right;flex-shrink:0}
.bar-track{flex:1;background:#EEF1F8;border-radius:4px;height:14px;min-width:0;position:relative;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:#1B2A4A;transition:width .4s}
.bar-fill.green{background:#2E7D32}
.bar-fill.amber{background:#E65100}
.bar-fill.red{background:#C62828}
.bar-val{font-size:11px;color:#6B82A8;width:140px;flex-shrink:0}

.modal{background:#fff;border-radius:12px;padding:22px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-size:14px;font-weight:600;color:#1B2A4A;margin-bottom:14px}
.frow{margin-bottom:11px}
.frow label{display:block;font-size:11px;color:#6B82A8;margin-bottom:3px;font-weight:500}

.frow input:focus,.frow select:focus{border-color:#1B2A4A}
.frow textarea{height:72px;resize:vertical}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;flex-wrap:wrap}
#toast{position:fixed;bottom:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.ti{padding:9px 14px;border-radius:7px;font-size:12px;font-weight:500;max-width:280px;animation:sIn .2s ease}
.tok{background:#1B2A4A;color:#fff}
.terr{background:#A32D2D;color:#fff}
.twarn{background:#E65100;color:#fff}
@keyframes sIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}
.wi{color:#E65100;font-size:12px;cursor:pointer}
.empty{text-align:center;padding:48px;color:#8BA3C7}
.empty-ico{font-size:36px;margin-bottom:10px}
.empty p{font-size:13px;line-height:1.6}
.legend{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#6B82A8}
.leg-dot{width:11px;height:11px;border-radius:2px;flex-shrink:0}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.sec-hd h2{font-size:15px;font-weight:600;color:#1B2A4A}
.tbl-wrap{overflow-x:auto}
.rate-info{background:#EEF1F8;border-radius:8px;padding:12px 16px;font-size:12px;color:#6B82A8;line-height:1.7}
.rate-info strong{color:#1B2A4A}
.tabs{display:flex;gap:0;background:#EEF1F8;border-radius:8px;padding:3px;margin-bottom:16px;width:fit-content}
.tab{padding:7px 14px;font-size:12px;font-weight:500;color:#6B82A8;border-radius:6px;cursor:pointer;transition:.15s}
.tab.on{background:#fff;color:#1B2A4A;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tab:hover:not(.on){color:#1B2A4A}
.pivot-controls{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;background:#F8FAFD;padding:12px;border-radius:8px;border:1px solid #E0E6F0}
.pivot-controls label{display:block;font-size:10px;font-weight:600;color:#6B82A8;text-transform:uppercase;margin-bottom:4px;letter-spacing:.04em}
.pivot-controls select{width:100%;padding:6px 10px;border:1px solid #D0D9E8;border-radius:6px;font-size:12px;color:#1B2A4A;background:#fff;outline:none}
.medal{display:inline-block;font-size:14px;margin-right:4px}
.adj-input{width:90px;padding:4px 6px;border:1px solid #D0D9E8;border-radius:4px;font-size:11px;text-align:right;outline:none}
.adj-input:focus{border-color:#1B2A4A}
.perf-card{background:linear-gradient(135deg,#FFF8E7 0%,#FFFAF0 100%);border:1px solid #F5C97D;border-radius:12px;padding:18px;text-align:center;margin-bottom:16px}
.perf-card h3{font-size:11px;font-weight:600;text-transform:uppercase;color:#8B5E00;letter-spacing:.06em;margin-bottom:8px}
.perf-card .big{font-size:28px;font-weight:700;color:#1B2A4A;line-height:1.1}
.perf-card .sub{font-size:12px;color:#6B82A8;margin-top:4px}
@media print{#sb,#toast,.btn,.tb-r{display:none!important}#mn{overflow:visible}#ct{overflow:visible;padding:8px}.sec{display:block!important}.card{break-inside:avoid}}

const SHEET_ID='1l6XtGN_h7k9IKmbwuvoalggDoJABcDhY2E1VNzUVIO4';

const BASE_SALARY=500, BASE_SALARY_PT=250;
const RATE_REG=BASE_SALARY/160;        // $3.1250/hr — regular hours
const RATE_OT=RATE_REG;                // $3.1250/hr — 1.5× hours paid at SAME rate (no premium, just tracked)

];

let S={records:[],roster:{},holidays:[...EC_HOL],adjustments:[],period:'',section:'overview',perfTab:'team',pivot:{rows:'employee',cols:'listing',metric:'avgPerListing'}};
let sortState={};

// ── STORAGE ──
function save(){
  try{
    localStorage.setItem('pd_r',JSON.stringify(S.records));
    localStorage.setItem('pd_ro',JSON.stringify(S.roster));
    localStorage.setItem('pd_h',JSON.stringify(S.holidays));
    localStorage.setItem('pd_adj',JSON.stringify(S.adjustments));
  }catch(e){toast('Storage nearly full — export a backup JSON!','warn');}
}
function loadStore(){
  try{
    const r=localStorage.getItem('pd_r'),ro=localStorage.getItem('pd_ro'),h=localStorage.getItem('pd_h'),adj=localStorage.getItem('pd_adj');
    if(r)S.records=JSON.parse(r);
    if(ro)S.roster=JSON.parse(ro);
    if(h)S.holidays=JSON.parse(h);
    if(adj)S.adjustments=JSON.parse(adj);
  }catch(e){console.error(e);}
}

// ── TIME/DATE ──
function parseTime(s){
  if(s===null||s===undefined||s==='')return null;
  if(s instanceof Date){return String(s.getHours()).padStart(2,'0')+':'+String(s.getMinutes()).padStart(2,'0');}
  if(typeof s==='number'){
    const tm=Math.round(s*24*60);
    const h=Math.floor(tm/60)%24,mn=tm%60;
    return String(h).padStart(2,'0')+':'+String(mn).padStart(2,'0');
  }
  const m=String(s).trim().match(/(\d+):(\d+)(?::\d+)?\s*(AM|PM)?/i);
  if(!m)return null;
  let h=parseInt(m[1]);const mn=m[2],ap=(m[3]||'').toUpperCase();
  if(ap==='PM'&&h!==12)h+=12;
  if(ap==='AM'&&h===12)h=0;
  return String(h).padStart(2,'0')+':'+mn;
}
function parseDate(s){
  if(s===null||s===undefined||s==='')return null;
  if(s instanceof Date){return s.getFullYear()+'-'+String(s.getMonth()+1).padStart(2,'0')+'-'+String(s.getDate()).padStart(2,'0');}
  const m=String(s).trim().match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  return m?`${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`:null;
}
function hDiff(t1,t2){
  const[h1,m1]=t1.split(':').map(Number),[h2,m2]=t2.split(':').map(Number);
  let ms=(h2*60+m2)-(h1*60+m1);
  if(ms<0)ms+=1440;
  return parseFloat((ms/60).toFixed(4));
}
function fmt(d){if(!d)return'';const[y,m,dd]=d.split('-');return`${dd}/${m}/${y}`;}
function monthLabel(p){
  if(!p)return'All time';
  const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if(p.includes('~')){
    const[from,to]=p.split('~');
    if(from&&to){
      if(from.substring(0,7)===to.substring(0,7)&&from.endsWith('-01')){
        const[y,m]=from.split('-');
        const last=new Date(parseInt(y),parseInt(m),0).getDate();
        if(to.endsWith('-'+String(last).padStart(2,'0')))return M[parseInt(m)-1]+' '+y;
      }
      return fmt(from)+' – '+fmt(to);
    }
    if(from)return'From '+fmt(from);
    if(to)return'Until '+fmt(to);
    return'All time';
  }
  if(p.length===7){const[y,m]=p.split('-');return M[parseInt(m)-1]+' '+y;}
  return fmt(p);
}
function fC(n){return'$'+parseFloat(n||0).toFixed(2);}
function fH(n){return parseFloat(n||0).toFixed(2)+'h';}
function firstName(n){return(n||'').split(' ')[0];}

// ── PAYROLL ──
function isHoliday(date){return S.holidays.some(h=>h.date===date);}
function calcRecord(r){
  if(r.del)return{hours:0,pay:0,otType:'del',regH:0,regP:0,otH:0,otP:0,ot2H:0,ot2P:0};
  const hours=hDiff(r.in,r.out);
  if(hours<=0)return{hours:0,pay:0,otType:'err',regH:0,regP:0,otH:0,otP:0,ot2H:0,ot2P:0};
  const hol=isHoliday(r.date);
  let regH=0,regP=0,otH=0,otP=0,ot2H=0,ot2P=0,otType;
  if(r.ot2x||hol||r.dayoff){
    ot2H=hours;ot2P=hours*RATE_OT2;
    otType=r.ot2x?'2x':hol?'2x-hol':'2x-off';
  }else{
    regH=Math.min(hours,8);regP=regH*RATE_REG;
    otH=Math.max(0,hours-8);otP=otH*RATE_OT;
    otType=otH>0?'1.5x':'regular';
  }
  return{hours,pay:regP+otP+ot2P,otType,regH,regP,otH,otP,ot2H,ot2P};
}
function otBadge(r){
  const{otType}=calcRecord(r);
  if(otType==='del')return'<span class="badge" style="background:#fee;color:#A32D2D">DEL</span>';
  if(otType.startsWith('2x'))return'<span class="badge b-2x">2×</span>';
  if(otType==='1.5x')return'<span class="badge b-15">1.5×</span>';
  return'<span class="badge b-reg">Reg</span>';
}
// Fractional months between two dates (inclusive). Each calendar month contributes (days_in_range / total_days_in_that_month)
function monthsBetween(startStr,endStr){
  if(!startStr||!endStr)return 0;
  const start=new Date(startStr+'T12:00:00');
  const end=new Date(endStr+'T12:00:00');
  if(start>end)return 0;
  let units=0;
  let cur=new Date(start);
  while(cur<=end){
    const y=cur.getFullYear(),m=cur.getMonth();
    const dim=new Date(y,m+1,0).getDate();
    const lastDay=new Date(y,m,dim,12,0,0);
    const periodEnd=lastDay>end?end:lastDay;
    const days=Math.round((periodEnd-cur)/86400000)+1;
    units+=days/dim;
    cur=new Date(y,m+1,1,12,0,0);
  }
  return units;
}
// Detect employee's hire date from first record (used for prorating floor)
function getEmployeeHireDate(empName){
  const recs=S.records.filter(r=>!r.del&&r.aux===empName);
  if(!recs.length)return null;
  return recs.reduce((min,r)=>r.date<min?r.date:min,recs[0].date);
}
// Full payroll calc per employee per period — applies the floor logic
function calcEmployeePayroll(empName,dateFrom,dateTo){
  const emp=S.roster[empName]||{type:'FT',salary:BASE_SALARY,role:'cleaner'};
  const base=emp.salary||(emp.type==='PT'?BASE_SALARY_PT:BASE_SALARY);
  const records=S.records.filter(r=>!r.del&&r.aux===empName&&(!dateFrom||r.date>=dateFrom)&&(!dateTo||r.date<=dateTo));
  let regH=0,otH=0,ot2H=0,regP=0,otP=0,ot2P=0;
  records.forEach(r=>{const c=calcRecord(r);regH+=c.regH;otH+=c.otH;ot2H+=c.ot2H;regP+=c.regP;otP+=c.otP;ot2P+=c.ot2P;});
  const wagesSubtotal=regP+otP;
  // Determine effective period for the floor
  let effStart=dateFrom,effEnd=dateTo;
  if(!effStart){
    const all=S.records.filter(r=>!r.del);
    if(all.length)effStart=all.reduce((min,r)=>r.date<min?r.date:min,all[0].date);
  }
  if(!effEnd)effEnd=new Date().toISOString().substring(0,10);
  // Prorate for hire date (only if hired AFTER period start)
  const hireDate=getEmployeeHireDate(empName);
  let prorated=false;
  if(hireDate&&effStart&&hireDate>effStart){effStart=hireDate;prorated=true;}
  const months=effStart&&effEnd?monthsBetween(effStart,effEnd):0;
  const floor=base*months;
  const wagesPaid=Math.max(wagesSubtotal,floor);
  const floorBonus=wagesPaid-wagesSubtotal;
  const honored=wagesSubtotal>=floor;
  const adjustments=S.adjustments.filter(a=>a.employee===empName&&(!dateFrom||a.date>=dateFrom)&&(!dateTo||a.date<=dateTo)).reduce((s,a)=>s+a.amount,0);
  return{aux:empName,base,months,floor,hireDate,prorated,
    regH,regP,otH,otP,ot2H,ot2P,wagesSubtotal,wagesPaid,floorBonus,honored,
    adjustments,total:wagesPaid+ot2P+adjustments,shifts:records.length};
}

// ── FILTERED RECORDS ──
function getDateBounds(){
  let from='',to='';
  if(S.period){
    if(S.period.includes('~')){[from,to]=S.period.split('~');}
    else if(S.period.length===7){
      from=S.period+'-01';
      const[y,m]=S.period.split('-');
      const last=new Date(parseInt(y),parseInt(m),0).getDate();
      to=S.period+'-'+String(last).padStart(2,'0');
    }
  }
  return{from,to};
}
function filtered(inclDel=false){
  const{from,to}=getDateBounds();
  return S.records.filter(r=>{
    if(!inclDel&&r.del)return false;
    if(from&&r.date<from)return false;
    if(to&&r.date>to)return false;
    return true;
  });
}
function filteredAdjustments(){
  const{from,to}=getDateBounds();
  return S.adjustments.filter(a=>{
    if(from&&a.date<from)return false;
    if(to&&a.date>to)return false;
    return true;
  });
}

// ── SORT UTIL ──
function sortBy(tableId,col,type){
  const cur=sortState[tableId];
  let dir='asc';
  if(cur&&cur.col===col)dir=cur.dir==='asc'?'desc':'asc';
  sortState[tableId]={col,dir,type:type||'string'};
  refresh();
}
function sortIcon(tableId,col){
  const s=sortState[tableId];
  if(!s||s.col!==col)return'<span class="si">↕</span>';
  return s.dir==='asc'?'<span class="si">↑</span>':'<span class="si">↓</span>';
}
function sortClass(tableId,col){
  const s=sortState[tableId];
  return(s&&s.col===col)?'sortable sorted':'sortable';
}
function applySort(arr,tableId,defaults){
  const s=sortState[tableId]||defaults||{col:null,dir:'asc',type:'string'};
  if(!s.col)return arr;
  return[...arr].sort((a,b)=>{
    let av=a[s.col],bv=b[s.col];
    if(s.type==='number'){av=parseFloat(av)||0;bv=parseFloat(bv)||0;return s.dir==='asc'?av-bv:bv-av;}
    if(s.type==='date'){return s.dir==='asc'?String(av).localeCompare(String(bv)):String(bv).localeCompare(String(av));}
    return s.dir==='asc'?String(av||'').localeCompare(String(bv||'')):String(bv||'').localeCompare(String(av||''));
  });
}
function thS(tableId,col,label,type){
  return`<th class="${sortClass(tableId,col)}" onclick="sortBy('${tableId}','${col}','${type||'string'}')">${label}${sortIcon(tableId,col)}</th>`;
}

async function cloudSave(silent){
  if(!CLOUD_SYNC_URL)return toast('Cloud sync URL not configured','err');
  const btn=document.getElementById('cloud-save-btn');
  if(btn){btn.disabled=true;btn.textContent='☁ Saving...';}
  const ctrl=new AbortController();
  const tmo=setTimeout(()=>ctrl.abort(),20000);
  try{
    const payload={records:S.records,roster:S.roster,holidays:S.holidays,adjustments:S.adjustments,savedFrom:navigator.userAgent.substring(0,80),savedAt:new Date().toISOString()};
    const res=await fetch(CLOUD_SYNC_URL,{method:'POST',mode:'cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload),redirect:'follow',signal:ctrl.signal});
    clearTimeout(tmo);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const text=await res.text();
    let data;try{data=JSON.parse(text);}catch(e){throw new Error('Bad response: '+text.substring(0,80));}
    if(!data.ok)throw new Error(data.error||'Unknown error');
    localStorage.setItem('pd_lastCloudSave',new Date().toISOString());
    if(!silent)toast(`Saved to cloud · ${(data.size/1024).toFixed(0)}KB`,'ok');
    updateCloudStatus();
  }catch(e){
    clearTimeout(tmo);
    const msg=e.name==='AbortError'?'Timeout (20s)':(e.message||'Network error');
    if(!silent)toast('Cloud save failed: '+msg,'err');
    console.error('Cloud save error:',e);
  }finally{
    if(btn){btn.disabled=false;btn.textContent='☁ Save Cloud';}
  }
}
async function cloudLoad(silent){
  if(!CLOUD_SYNC_URL)return toast('Cloud sync URL not configured','err');
  const btn=document.getElementById('cloud-load-btn');
  if(btn){btn.disabled=true;btn.textContent='☁ Loading...';}
  const ctrl=new AbortController();
  const tmo=setTimeout(()=>ctrl.abort(),20000);
  try{
    const res=await fetch(CLOUD_SYNC_URL+'?action=load&t='+Date.now(),{method:'GET',mode:'cors',redirect:'follow',signal:ctrl.signal});
    clearTimeout(tmo);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const text=await res.text();
    let data;try{data=JSON.parse(text);}catch(e){throw new Error('Bad response: '+text.substring(0,80));}
    if(!data.ok)throw new Error(data.error||'Unknown error');
    if(!data.state){if(!silent)toast('Cloud is empty — save first','warn');return;}
    if(!silent&&S.records.length>0){
      const cloudCount=(data.state.records||[]).length;
      if(!confirm(`Replace ${S.records.length} local records with ${cloudCount} from cloud?\n\nLocal edits not yet saved to cloud will be lost.`))return;
    }
    S.records=data.state.records||[];
    S.roster=data.state.roster||{};
    S.holidays=data.state.holidays||[...EC_HOL];
    S.adjustments=data.state.adjustments||[];
    localStorage.setItem('pd_lastCloudLoad',new Date().toISOString());
    detectOverlaps();save();populatePeriods();refresh();updateCloudStatus();
    if(!silent)toast(`Loaded ${S.records.length} records · saved ${data.savedAt?new Date(data.savedAt).toLocaleString():'unknown'}`,'ok');
  }catch(e){
    clearTimeout(tmo);
    const msg=e.name==='AbortError'?'Timeout (20s) — script may need re-authorization':(e.message||'Network error');
    if(!silent)toast('Cloud load failed: '+msg,'err');
    console.error('Cloud load error:',e);
  }finally{
    if(btn){btn.disabled=false;btn.textContent='☁ Load Cloud';}
  }
}
function updateCloudStatus(){
  const lastSave=localStorage.getItem('pd_lastCloudSave');
  const lastLoad=localStorage.getItem('pd_lastCloudLoad');
  const el=document.getElementById('cloud-status');
  if(!el)return;
  if(lastSave||lastLoad){
    const t=new Date(lastSave||lastLoad);
    const mins=Math.floor((Date.now()-t.getTime())/60000);
    let label;
    if(mins<1)label='just now';
    else if(mins<60)label=`${mins}m ago`;
    else if(mins<1440)label=`${Math.floor(mins/60)}h ago`;
    else label=`${Math.floor(mins/1440)}d ago`;
    el.textContent=`☁ ${lastSave?'Saved':'Loaded'} ${label}`;
    el.style.display='inline';
  }else{
    el.style.display='none';
  }
}

async function loadFromSheets(){
  const btn=document.getElementById('load-btn');
  btn.disabled=true;btn.textContent='⟳ Loading...';
  // Detect sandboxed environment (Claude.ai artifact preview blocks external fetches)
  const inSandbox=(()=>{try{return window.location.hostname.includes('claude.ai')||window.location.protocol==='blob:'||window.location.protocol==='about:'||window.parent!==window;}catch(e){return true;}})();
  const directUrl=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&cachebust=${Date.now()}`;
  const proxyUrls=[directUrl,`https://corsproxy.io/?${encodeURIComponent(directUrl)}`,`https://api.allorigins.win/raw?url=${encodeURIComponent(directUrl)}`,`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(directUrl)}`];
  const errors=[];
  for(let i=0;i<proxyUrls.length;i++){
    try{
      btn.textContent=i===0?'⟳ Direct...':`⟳ Proxy ${i}...`;
      const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),12000);
      const res=await fetch(proxyUrls[i],{redirect:'follow',signal:ctrl.signal});
      clearTimeout(tmo);
      if(!res.ok){errors.push(`#${i+1}: HTTP ${res.status}`);continue;}
      const text=await res.text();
      if(!text||text.length<20){errors.push(`#${i+1}: Empty response`);continue;}
      if(text.toLowerCase().includes('<html')&&(text.toLowerCase().includes('sign in')||text.toLowerCase().includes('login'))){errors.push(`#${i+1}: Sheet not public`);continue;}
      const rows=parseCSV(text);
      if(!rows.length){errors.push(`#${i+1}: No valid rows`);continue;}
      const added=mergeRecords(rows);updateRoster(rows);detectOverlaps();save();populatePeriods();refresh();
      toast(`Synced: ${rows.length} rows, ${added} new records.`,'ok');
      btn.disabled=false;btn.textContent='⟳ Sync Sheets';return;
    }catch(e){errors.push(`#${i+1}: ${e.name==='AbortError'?'Timeout':e.message||'Fetch blocked'}`);}
  }
  showSyncErrorModal(errors,inSandbox);
  btn.disabled=false;btn.textContent='⟳ Sync Sheets';
}

async function uploadFile(eventOrFile){
  const file=eventOrFile.target?eventOrFile.target.files[0]:eventOrFile;
  if(!file)return;
  if(typeof XLSX==='undefined')return toast('XLSX library still loading','err');
  try{
    const buf=await file.arrayBuffer();
    let rows;
    const ext=(file.name.split('.').pop()||'').toLowerCase();
    if(ext==='csv'||ext==='tsv'||ext==='txt'){
      let txt=new TextDecoder('utf-8').decode(buf);
      if(txt.includes('\t')&&!txt.split('\n')[0].includes(','))txt=txt.replace(/\t/g,',');
      rows=parseCSV(txt);
    }else{
      const wb=XLSX.read(buf,{type:'array',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const json=XLSX.utils.sheet_to_json(ws,{raw:false,defval:''});
      rows=json.map(obj=>{
        const keys=Object.keys(obj);
        const find=(needle)=>{const k=keys.find(k=>k.toLowerCase().includes(needle.toLowerCase()));return k?obj[k]:'';};
        const ts=find('Timestamp');const aux=String(find('Auxiliar')||'').trim();
        const inT=parseTime(find('Ingreso'));const outT=parseTime(find('Salida'));
        const loc=String(find('Lugar')||'').trim();
        if(!ts||!aux||!inT||!outT)return null;
        const date=parseDate(ts);if(!date)return null;
        const id=`${date}|${aux}|${inT}|${outT}`.replace(/\s/g,'');
        return{id,date,aux,in:inT,out:outT,loc,
          dmg:String(find('daño')||find('perdid')||''),
          notes:String(find('Novedad')||''),
          ot2x:false,dayoff:false,del:false,edited:false,flagOverlap:false,accepted:false};
      }).filter(Boolean);
    }
    if(!rows.length)return toast('No valid rows found','err');
    const added=mergeRecords(rows);updateRoster(rows);detectOverlaps();save();populatePeriods();refresh();
    toast(`Imported ${rows.length} rows from "${file.name}", ${added} new.`,'ok');
    document.getElementById('file-input').value='';
  }catch(e){toast('Error: '+(e.message||'Unknown'),'err');console.error(e);}
}
function parseCSVLine(line){
  const cols=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){cols.push(cur);cur='';}else cur+=c;
  }
  cols.push(cur);return cols;
}
function parseCSV(text){
  const lines=text.split('\n').map(l=>l.trimEnd()).filter(l=>l);
  if(lines.length<2)return[];
  const hdrs=parseCSVLine(lines[0]).map(h=>h.trim().replace(/^"|"$/g,''));
  const ci=(name)=>hdrs.findIndex(h=>h.toLowerCase().includes(name.toLowerCase()));
  const iTs=ci('Timestamp'),iAux=ci('Auxiliar'),iIn=ci('Ingreso'),iOut=ci('Salida'),iLoc=ci('Lugar'),iDmg=ci('daño'),iNotes=ci('Novedad');
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const v=parseCSVLine(lines[i]).map(s=>s.trim().replace(/^"|"$/g,''));
    const ts=v[iTs]||'',aux=(v[iAux]||'').trim();
    const inT=parseTime(v[iIn]),outT=parseTime(v[iOut]);
    if(!ts||!aux||!inT||!outT)continue;
    const date=parseDate(ts);if(!date)continue;
    const loc=(v[iLoc]||'').trim();
    const id=`${date}|${aux}|${inT}|${outT}`.replace(/\s/g,'');
    rows.push({id,date,aux,in:inT,out:outT,loc,
      dmg:iDmg>=0?v[iDmg]:'',notes:iNotes>=0?v[iNotes]:'',
      ot2x:false,dayoff:false,del:false,edited:false,flagOverlap:false,accepted:false});
  }
  return rows;
}
function mergeRecords(rows){
  const ex=new Set(S.records.map(r=>r.id));let added=0;
  rows.forEach(r=>{if(!ex.has(r.id)){S.records.push(r);ex.add(r.id);added++;}});
  return added;
}
function updateRoster(rows){
  rows.forEach(r=>{if(r.aux&&!S.roster[r.aux])S.roster[r.aux]={type:'FT',salary:500};});
}
function detectOverlaps(){
  S.records.forEach(r=>r.flagOverlap=false);
  const grp={};
  S.records.filter(r=>!r.del).forEach(r=>{const k=r.aux+'|'+r.date;(grp[k]=grp[k]||[]).push(r);});
  Object.values(grp).forEach(g=>{
    if(g.length<2)return;
    g.sort((a,b)=>a.in.localeCompare(b.in));
    for(let i=0;i<g.length-1;i++){
      if(g[i].out>g[i+1].in&&!g[i].accepted&&!g[i+1].accepted){g[i].flagOverlap=true;g[i+1].flagOverlap=true;}
    }
  });
}

function populatePeriods(){
  const sel=document.getElementById('period-sel');
  const dfrom=document.getElementById('dfrom'),dto=document.getElementById('dto');
  if(!sel||!dfrom||!dto)return;
  if(!S.period){sel.value='all';dfrom.value='';dto.value='';}
  else if(S.period.includes('~')){
    const[from,to]=S.period.split('~');
    dfrom.value=from||'';dto.value=to||'';sel.value='custom';
  }else if(S.period.length===7){
    const[y,m]=S.period.split('-');
    const last=new Date(parseInt(y),parseInt(m),0).getDate();
    dfrom.value=S.period+'-01';
    dto.value=S.period+'-'+String(last).padStart(2,'0');
    sel.value='custom';
  }
}
function applyPreset(p){
  const now=new Date();
  const todayStr=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  const lastDayCur=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const monthEndStr=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(lastDayCur).padStart(2,'0');
  let from='',to='';
  if(p==='all'){}
  else if(p==='thismonth'){from=todayStr.substring(0,7)+'-01';to=monthEndStr;}
  else if(p==='lastmonth'){
    const d=new Date(now.getFullYear(),now.getMonth()-1,1);
    const ym=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const last=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
    from=ym+'-01';to=ym+'-'+String(last).padStart(2,'0');
  }
  else if(p==='last3'){
    const d=new Date(now.getFullYear(),now.getMonth()-2,1);
    from=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-01';to=monthEndStr;
  }
  else if(p==='thisyear'){from=now.getFullYear()+'-01-01';to=monthEndStr;}
  else if(p==='lastyear'){const y=now.getFullYear()-1;from=y+'-01-01';to=y+'-12-31';}
  else if(p==='custom'){document.getElementById('dfrom').focus();return;}
  document.getElementById('dfrom').value=from;
  document.getElementById('dto').value=to;
  S.period=(from||to)?`${from}~${to}`:'';
  refresh();
}
function setCustomRange(){
  const from=document.getElementById('dfrom').value;
  const to=document.getElementById('dto').value;
  document.getElementById('period-sel').value='custom';
  S.period=(from||to)?`${from}~${to}`:'';
  refresh();
}
function navigate(sec){
  S.section=sec;sortState={};
  document.querySelectorAll('.nav').forEach(n=>n.classList.toggle('on',n.dataset.sec===sec));
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.getElementById('sec-'+sec).classList.add('on');
  const T={overview:'Overview',rawdata:'Raw Data',payroll:'Payroll Report',performance:'Performance',costcenter:'Cost Centers',employees:'Employees',holidays:'Holidays',export:'Export'};
  document.getElementById('tb-title').textContent=T[sec]||sec;
  document.getElementById('tb-sub').textContent=monthLabel(S.period);
  renderSection(sec);
}
function refresh(){
  populatePeriods();
  document.getElementById('tb-sub').textContent=monthLabel(S.period);
  renderSection(S.section);
}
function renderSection(sec){
  ({overview:renderOverview,rawdata:renderRawData,payroll:renderPayroll,performance:renderPerformance,
    costcenter:renderCostCenter,employees:renderEmployees,holidays:renderHolidays,export:renderExport}[sec]||(() => {}))();
}

  adjs.forEach(a=>empSet.add(a.employee));

  const tWages=empPayroll.reduce((s,p)=>s+p.wagesPaid+p.ot2P,0);
  const adjTotal=empPayroll.reduce((s,p)=>s+p.adjustments,0);

  </div>
  ${ccList.length?`<div class="card">
    <div class="card-hd"><span class="card-ti">Hourly Cost by Listing <span style="font-size:10px;color:#8BA3C7;font-weight:400">(raw — excludes floor top-ups)</span></span><span style="font-size:11px;color:#8BA3C7">${monthLabel(S.period)}</span></div>
    <div class="bar-wrap">${ccList.slice(0,12).map(([loc,d])=>`

        <div class="bar-label" title="${loc}">${loc}</div>

        <div class="bar-val">${fC(d.pay)} · ${d.shifts} sh</div>

    ${ccList.length>12?`<p style="font-size:11px;color:#8BA3C7;margin-top:8px;text-align:center">+${ccList.length-12} more listings · <a href="#" onclick="navigate('costcenter');return false" style="color:#1B2A4A">see all</a></p>`:''}
  </div>`:''}

    <div style="padding:14px 18px 8px;display:flex;justify-content:space-between;align-items:center">

      <tbody>${empList.slice(0,15).map((e,i)=>{

function addAdjustment(emp){

    <div class="frow"><label>Date (must be in current filter range to count)</label>
      <input type="date" id="adj-date" value="${new Date().toISOString().split('T')[0]}"></div>

function saveAdjustment(emp){
  const date=document.getElementById('adj-date').value;
  const label=document.getElementById('adj-label').value.trim();
  const amount=parseFloat(document.getElementById('adj-amount').value);
  if(!date||isNaN(amount))return toast('Date and amount required','err');
  S.adjustments.push({id:'adj_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),employee:emp,date,label,amount});
  save();closeModal();refresh();toast('Adjustment added','ok');
}
function removeAdjustment(id){
  if(!confirm('Remove this adjustment?'))return;
  S.adjustments=S.adjustments.filter(a=>a.id!==id);

}

function renderPerfTeam(recs){
  // Per-listing avg time per employee
  const empLocStats={}; // emp -> {loc -> {visits, hours}}
  const locStats={}; // loc -> {visits, hours, byEmp}
  const empOverall={}; // emp -> {visits, hours}
  recs.forEach(r=>{
    if(!r.loc)return;
    const c=calcRecord(r);
    if(!empLocStats[r.aux])empLocStats[r.aux]={};
    if(!empLocStats[r.aux][r.loc])empLocStats[r.aux][r.loc]={visits:0,hours:0};
    empLocStats[r.aux][r.loc].visits++;empLocStats[r.aux][r.loc].hours+=c.hours;
    if(!locStats[r.loc])locStats[r.loc]={visits:0,hours:0,byEmp:{}};
    locStats[r.loc].visits++;locStats[r.loc].hours+=c.hours;
    if(!locStats[r.loc].byEmp[r.aux])locStats[r.loc].byEmp[r.aux]={visits:0,hours:0};
    locStats[r.loc].byEmp[r.aux].visits++;locStats[r.loc].byEmp[r.aux].hours+=c.hours;
    if(!empOverall[r.aux])empOverall[r.aux]={visits:0,hours:0,locs:new Set()};
    empOverall[r.aux].visits++;empOverall[r.aux].hours+=c.hours;empOverall[r.aux].locs.add(r.loc);
  });
  // Each employee's avg per listing = sum of (per-loc avg) / #locs
  const empAvg={};
  Object.entries(empLocStats).forEach(([aux,locs])=>{
    const avgs=Object.values(locs).map(l=>l.hours/l.visits);
    empAvg[aux]={avgPerListing:avgs.reduce((s,v)=>s+v,0)/avgs.length,
      totalHours:empOverall[aux].hours,visits:empOverall[aux].visits,locs:empOverall[aux].locs.size};
  });
  const empRanked=Object.entries(empAvg).map(([aux,d])=>({aux,fn:firstName(aux),...d})).sort((a,b)=>a.avgPerListing-b.avgPerListing);
  // Per-listing team avg
  const locRanked=Object.entries(locStats).map(([loc,d])=>{
    const empAvgs=Object.entries(d.byEmp).map(([aux,v])=>({aux,fn:firstName(aux),avg:v.hours/v.visits}));
    empAvgs.sort((a,b)=>a.avg-b.avg);
    return{loc,visits:d.visits,teamAvg:d.hours/d.visits,best:empAvgs[0],worst:empAvgs.length>1?empAvgs[empAvgs.length-1]:null,empCount:empAvgs.length};
  });
  const locSorted=applySort(locRanked,'perf-loc',{col:'teamAvg',dir:'asc',type:'number'});
  const teamAvgAll=Object.values(locStats).reduce((s,l)=>s+l.hours,0)/Object.values(locStats).reduce((s,l)=>s+l.visits,0);
  // Heatmap: rows=employees, cols=top listings, cells=avg time
  const allLocs=Object.keys(locStats).sort();
  const maxLocs=Math.min(allLocs.length,15);
  const topLocs=Object.entries(locStats).sort((a,b)=>b[1].visits-a[1].visits).slice(0,maxLocs).map(([l])=>l);
  
  return`
  <!-- TOP HERO STAT -->
  <div class="perf-card">
    <h3>🥇 Top Performer this period</h3>
    <div class="big">${empRanked[0]?.fn||'—'}</div>
    <div class="sub">Average ${empRanked[0]?fH(empRanked[0].avgPerListing):'—'} per listing · ${empRanked[0]?.visits||0} listings cleaned · works at ${empRanked[0]?.locs||0} locations</div>
  </div>
  
  <!-- KPI ROW -->
  <div class="kgrid">
    <div class="kc gold"><div class="kl">🥈 2nd Place</div><div class="kv" style="font-size:18px">${empRanked[1]?.fn||'—'}</div><div class="ks">${empRanked[1]?fH(empRanked[1].avgPerListing):''} avg</div></div>
    <div class="kc gold"><div class="kl">🥉 3rd Place</div><div class="kv" style="font-size:18px">${empRanked[2]?.fn||'—'}</div><div class="ks">${empRanked[2]?fH(empRanked[2].avgPerListing):''} avg</div></div>
    <div class="kc"><div class="kl">Team Avg / Listing</div><div class="kv">${fH(teamAvgAll)}</div><div class="ks">across ${Object.keys(locStats).length} listings</div></div>
    <div class="kc"><div class="kl">Total Listings Cleaned</div><div class="kv">${recs.length}</div><div class="ks">${empRanked.length} cleaners</div></div>
  </div>
  
  <!-- EMPLOYEE LEADERBOARD BAR CHART -->
  <div class="card">
    <div class="card-hd"><span class="card-ti">🏆 Cleaner Leaderboard — average time per listing (lower = faster)</span></div>
    <div class="bar-wrap">${empRanked.map((e,i)=>{
      const pct=Math.min(100,(e.avgPerListing/Math.max(...empRanked.map(x=>x.avgPerListing)))*100);
      const cls=i===0?'green':i<3?'':e.avgPerListing>teamAvgAll*1.1?'red':e.avgPerListing>teamAvgAll?'amber':'';
      const medal=i===0?'🥇 ':i===1?'🥈 ':i===2?'🥉 ':'';
      return`<div class="bar-row">
        <div class="bar-label" style="font-weight:${i<3?'600':'400'}">${medal}${e.fn}</div>
        <div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct.toFixed(1)}%"></div></div>
        <div class="bar-val">${fH(e.avgPerListing)} · ${e.visits} listings</div>
      </div>`;
    }).join('')}</div>
  </div>
  
  <!-- HEATMAP: Avg time per listing by employee -->
  <div class="card">
    <div class="card-hd"><span class="card-ti">Average Time per Listing — by Cleaner</span>
      <div class="legend">
        <span class="leg-item"><span class="leg-dot" style="background:#2E7D32"></span>Below team avg</span>
        <span class="leg-item"><span class="leg-dot" style="background:#FFA726"></span>Near team avg</span>
        <span class="leg-item"><span class="leg-dot" style="background:#C62828"></span>Above team avg</span>
        <span class="leg-item"><span class="leg-dot" style="background:#F0F3F8"></span>Not visited</span>
      </div>
    </div>
    <div class="hm-wrap"><table class="hm-table">
      <thead><tr><th style="width:80px"></th>${topLocs.map(l=>`<th class="rotated" title="${l}">${l.length>14?l.substring(0,14)+'…':l}</th>`).join('')}</tr></thead>
      <tbody>${empRanked.map(e=>`<tr>
        <td class="hm-name">${e.fn}</td>
        ${topLocs.map(l=>{
          const s=empLocStats[e.aux]?.[l];
          if(!s)return`<td><span class="hm-cell empty"></span></td>`;
          const avg=s.hours/s.visits;
          const teamAvg=locStats[l].hours/locStats[l].visits;
          const ratio=avg/teamAvg;
          const bg=ratio<0.9?'#2E7D32':ratio<1.05?'#66BB6A':ratio<1.2?'#FFA726':'#C62828';
          return`<td><span class="hm-cell" style="background:${bg}" title="${e.fn} @ ${l}: avg ${fH(avg)} (team avg ${fH(teamAvg)}) — ${s.visits} visits">${avg.toFixed(1)}</span></td>`;
        }).join('')}
      </tr>`).join('')}</tbody>
    </table></div>
    ${allLocs.length>maxLocs?`<p style="font-size:11px;color:#8BA3C7;margin-top:8px;text-align:center">Showing top ${maxLocs} listings by visit count. ${allLocs.length-maxLocs} more in Manager View.</p>`:''}
  </div>
  
  <!-- BEST/WORST PER LOCATION -->
  <div class="card" style="padding:0">
    <div style="padding:14px 18px 8px"><span class="card-ti">Best & Worst Average Time by Listing</span></div>
    <div class="tbl-wrap"><table>
      <thead><tr>
        ${thS('perf-loc','loc','Listing')}
        ${thS('perf-loc','visits','Visits','number')}
        ${thS('perf-loc','teamAvg','Team Avg','number')}
        <th>🟢 Fastest</th><th>Avg</th>
        <th>🔴 Slowest</th><th>Avg</th>
      </tr></thead>
      <tbody>${locSorted.map(l=>`<tr>
        <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500" title="${l.loc}">${l.loc}</td>
        <td>${l.visits}</td><td>${fH(l.teamAvg)}</td>
        <td style="color:#2E7D32;font-weight:600">${l.best?.fn||'—'}</td>
        <td>${l.best?fH(l.best.avg):'—'}</td>
        <td style="color:#C62828;font-weight:600">${l.worst?l.worst.fn:'—'}</td>
        <td>${l.worst?fH(l.worst.avg):'—'}</td>
      </tr>`).join('')}</tbody>
    </table></div>
  </div>`;
}

function renderPerfManager(recs){
  // Pivot table builder
  const dimensions={
    employee:{label:'Employee',getKey:r=>firstName(r.aux)},
    listing:{label:'Listing',getKey:r=>r.loc||'(Unassigned)'},
    month:{label:'Month',getKey:r=>r.date.substring(0,7)},
    none:{label:'(None — totals only)',getKey:r=>'Total'}
  };
  const metrics={
    avgPerListing:{label:'Avg time per listing',calc:items=>{
      const byLoc={};
      items.forEach(r=>{const c=calcRecord(r);if(!byLoc[r.loc])byLoc[r.loc]={h:0,n:0};byLoc[r.loc].h+=c.hours;byLoc[r.loc].n++;});
      const avgs=Object.values(byLoc).map(v=>v.h/v.n);
      return avgs.length?avgs.reduce((s,v)=>s+v,0)/avgs.length:0;
    },fmt:fH},
    avgPerShift:{label:'Avg time per shift',calc:items=>{
      const tot=items.reduce((s,r)=>s+calcRecord(r).hours,0);return items.length?tot/items.length:0;
    },fmt:fH},
    totalHours:{label:'Total hours',calc:items=>items.reduce((s,r)=>s+calcRecord(r).hours,0),fmt:fH},
    shifts:{label:'# Shifts',calc:items=>items.length,fmt:n=>n.toFixed(0)},
    listings:{label:'# Listings (unique)',calc:items=>new Set(items.map(r=>r.loc)).size,fmt:n=>n.toFixed(0)},
    pay:{label:'Total pay',calc:items=>items.reduce((s,r)=>s+calcRecord(r).pay,0),fmt:fC}
  };
  const{rows:rDim,cols:cDim,metric}=S.pivot;
  const M=metrics[metric]||metrics.avgPerListing;
  const grid={};const rowSet=new Set(),colSet=new Set();
  recs.forEach(r=>{
    const rk=dimensions[rDim].getKey(r),ck=dimensions[cDim].getKey(r);
    rowSet.add(rk);colSet.add(ck);
    if(!grid[rk])grid[rk]={};
    if(!grid[rk][ck])grid[rk][ck]=[];
    grid[rk][ck].push(r);
  });
  const rowsArr=[...rowSet].sort();
  const colsArr=[...colSet].sort();
  // Compute values
  const cellVals={};const rowTotals={};const colTotals={};
  rowsArr.forEach(rk=>{
    cellVals[rk]={};
    let allRow=[];
    colsArr.forEach(ck=>{const items=grid[rk]?.[ck]||[];cellVals[rk][ck]=items.length?M.calc(items):null;allRow=allRow.concat(items);});
    rowTotals[rk]=allRow.length?M.calc(allRow):null;
  });
  colsArr.forEach(ck=>{
    let allCol=[];
    rowsArr.forEach(rk=>{const items=grid[rk]?.[ck]||[];allCol=allCol.concat(items);});
    colTotals[ck]=allCol.length?M.calc(allCol):null;
  });
  const grandTotal=M.calc(recs);
  // Find min/max for color
  let allVals=[];
  Object.values(cellVals).forEach(row=>Object.values(row).forEach(v=>{if(v!==null)allVals.push(v);}));
  const minV=Math.min(...allVals),maxV=Math.max(...allVals);
  const colorCell=(v)=>{
    if(v===null)return'#F0F3F8';
    if(maxV===minV)return'#B5D4F4';
    const ratio=(v-minV)/(maxV-minV);
    // For "lower is better" metrics (avg time), invert
    const inverted=['avgPerListing','avgPerShift'].includes(metric);
    const r=inverted?(1-ratio):ratio;
    if(r<0.25)return'#9FE1CB';if(r<0.5)return'#5DCAA5';if(r<0.75)return'#FAC775';return'#F09595';
  };
  
  return`
  <div class="card">
    <div class="card-hd"><span class="card-ti">⚙ Custom Pivot Comparison</span>
      <span style="font-size:11px;color:#8BA3C7">Mix and match dimensions to compare</span>
    </div>
    <div class="pivot-controls">
      <div><label>Rows</label><select onchange="setPivot('rows',this.value)">
        ${Object.entries(dimensions).filter(([k])=>k!=='none').map(([k,d])=>`<option value="${k}" ${rDim===k?'selected':''}>${d.label}</option>`).join('')}
      </select></div>
      <div><label>Columns</label><select onchange="setPivot('cols',this.value)">
        ${Object.entries(dimensions).map(([k,d])=>`<option value="${k}" ${cDim===k?'selected':''}>${d.label}</option>`).join('')}
      </select></div>
      <div><label>Metric</label><select onchange="setPivot('metric',this.value)">
        ${Object.entries(metrics).map(([k,m])=>`<option value="${k}" ${metric===k?'selected':''}>${m.label}</option>`).join('')}
      </select></div>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th style="background:#1B2A4A;color:#fff">${dimensions[rDim].label} \\ ${dimensions[cDim].label}</th>
        ${colsArr.map(c=>`<th style="text-align:center" title="${c}">${c.length>16?c.substring(0,16)+'…':c}</th>`).join('')}
        ${cDim!=='none'?'<th style="text-align:center;background:#243558;color:#fff">Total</th>':''}
      </tr></thead>
      <tbody>${rowsArr.map(rk=>`<tr>
        <td style="font-weight:500;background:#F4F6FB" title="${rk}">${rk.length>22?rk.substring(0,22)+'…':rk}</td>
        ${colsArr.map(ck=>{const v=cellVals[rk][ck];return`<td style="background:${colorCell(v)};text-align:center;color:#1B2A4A;font-weight:500" title="${dimensions[rDim].label}: ${rk} | ${dimensions[cDim].label}: ${ck}">${v===null?'—':M.fmt(v)}</td>`;}).join('')}
        ${cDim!=='none'?`<td style="font-weight:600;background:#EEF1F8;text-align:center">${rowTotals[rk]===null?'—':M.fmt(rowTotals[rk])}</td>`:''}
      </tr>`).join('')}</tbody>
      ${cDim!=='none'?`<tfoot><tr>
        <td>Total</td>
        ${colsArr.map(ck=>`<td style="text-align:center">${colTotals[ck]===null?'—':M.fmt(colTotals[ck])}</td>`).join('')}
        <td style="text-align:center;color:#8B5E00">${M.fmt(grandTotal)}</td>
      </tr></tfoot>`:''}
    </table></div>
    <p style="font-size:11px;color:#8BA3C7;margin-top:10px;line-height:1.5">
      💡 <strong>Tip:</strong> Try Rows=Employee, Columns=Month, Metric=Avg time per listing — to see who's getting faster.<br>
      Or Rows=Listing, Columns=Employee, Metric=Avg time per shift — to find the right cleaner per property.
    </p>
  </div>`;
}

// ── EXPORT ──
function exportExcel(){
  if(typeof XLSX==='undefined')return toast('XLSX not loaded','err');
  const wb=XLSX.utils.book_new();
  const recs=filtered();
  const adjs=filteredAdjustments();
  const{from:dateFrom,to:dateTo}=getDateBounds();
  // Raw data
  const raw=recs.map(r=>{const c=calcRecord(r);return{Date:fmt(r.date),Employee:r.aux,'Clock In':r.in,'Clock Out':r.out,Hours:+c.hours.toFixed(2),Location:r.loc,'OT Type':c.otType,'Reg Pay':+c.regP.toFixed(2),'OT 1.5x Pay':+c.otP.toFixed(2),'OT 2x Pay':+c.ot2P.toFixed(2),'Total Pay':+c.pay.toFixed(2),Notes:r.notes||''};});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(raw),'Raw Data');
  // Payroll — full calc with floor
  const empSet=new Set();
  recs.forEach(r=>empSet.add(r.aux));
  adjs.forEach(a=>empSet.add(a.employee));
  const payroll=[...empSet].map(aux=>{
    const p=calcEmployeePayroll(aux,dateFrom,dateTo);
    const r=S.roster[aux]||{type:'FT',role:'cleaner'};
    return{Employee:aux,Type:r.type,Role:r.role||'cleaner',
      Shifts:p.shifts,
      'Reg Hrs':+p.regH.toFixed(2),'Reg Pay':+p.regP.toFixed(2),
      '1.5x Hrs':+p.otH.toFixed(2),'1.5x Pay':+p.otP.toFixed(2),
      Subtotal:+p.wagesSubtotal.toFixed(2),
      Months:+p.months.toFixed(3),
      'Floor':+p.floor.toFixed(2),
      'Wages Paid':+p.wagesPaid.toFixed(2),
      'Floor Bonus':+p.floorBonus.toFixed(2),
      Prorated:p.prorated?'Yes':'No',
      '2x Hrs':+p.ot2H.toFixed(2),'2x Pay':+p.ot2P.toFixed(2),
      Adjustments:+p.adjustments.toFixed(2),
      TOTAL:+p.total.toFixed(2)};
  }).sort((a,b)=>b.TOTAL-a.TOTAL);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(payroll),'Payroll');
  // Cost centers (raw hourly, no floor — floor is per-employee not per-location)
  const ccMap={};
  recs.forEach(r=>{const l=r.loc||'Unassigned';if(!ccMap[l])ccMap[l]={shifts:0,hours:0,pay:0};
    const c=calcRecord(r);ccMap[l].shifts++;ccMap[l].hours+=c.hours;ccMap[l].pay+=c.pay;});
  const cc=Object.entries(ccMap).map(([loc,d])=>({Location:loc,Shifts:d.shifts,'Total Hours':+d.hours.toFixed(2),'Hourly Cost USD':+d.pay.toFixed(2)})).sort((a,b)=>b['Hourly Cost USD']-a['Hourly Cost USD']);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(cc),'Cost Centers');
  // Adjustments
  if(adjs.length){
    const adjData=adjs.map(a=>({Date:fmt(a.date),Employee:a.employee,Label:a.label,Amount:+a.amount.toFixed(2)}));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(adjData),'Adjustments');
  }
  XLSX.writeFile(wb,`payroll_${S.period||'all'}_${new Date().toISOString().split('T')[0]}.xlsx`);
  toast('Excel downloaded!','ok');
}
function exportJSON(){
  const blob=new Blob([JSON.stringify({records:S.records,roster:S.roster,holidays:S.holidays,adjustments:S.adjustments,exported:new Date().toISOString()},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`payroll_backup_${new Date().toISOString().split('T')[0]}.json`;a.click();
  toast('Backup exported','ok');
}
function importJSON(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.records)S.records=d.records;
        if(d.roster)S.roster=d.roster;
        if(d.holidays)S.holidays=d.holidays;
        if(d.adjustments)S.adjustments=d.adjustments;
        detectOverlaps();save();populatePeriods();refresh();
        toast(`Imported: ${S.records.length} records, ${S.adjustments.length} adjustments`,'ok');
      }catch(e){toast('Invalid JSON','err');}
    };reader.readAsText(file);
  };inp.click();
}

// ── MODAL/TOAST ──
function showModal(html){document.getElementById('modal').innerHTML=html;document.getElementById('modal-bg').style.display='flex';}
function closeModal(){document.getElementById('modal-bg').style.display='none';}
function toast(msg,type='ok'){
  const t=document.getElementById('toast');
  const el=document.createElement('div');
  el.className=`ti t${type==='err'?'err':type==='warn'?'warn':'ok'}`;
  el.textContent=msg;t.appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

// ── NAV CLICKS ──
document.querySelectorAll('.nav').forEach(n=>n.addEventListener('click',()=>navigate(n.dataset.sec)));

// ── INIT ──
async function init(){
  loadStore();
  // Migrate roster: assign default roles + special cases for Ivan & Jennifer
  Object.keys(S.roster).forEach(name=>{
    if(!S.roster[name].role){
      const lo=name.toLowerCase();
      if(lo.includes('ivan'))S.roster[name].role='operations';
      else if(lo.includes('jennifer'))S.roster[name].role='laundry';
      else S.roster[name].role='cleaner';
    }
  });
  save();
  detectOverlaps();
  populatePeriods();
  navigate('overview');
  updateCloudStatus();
  // Auto-load from cloud on first launch (only if local is empty)
  if(S.records.length===0&&CLOUD_SYNC_URL){
    toast('Checking cloud for saved data...','ok');
    await cloudLoad(true);
    if(S.records.length>0)toast(`Loaded ${S.records.length} records from cloud`,'ok');
  }
  // Refresh cloud status every minute
  setInterval(updateCloudStatus,60000);
}
init();
</script>
