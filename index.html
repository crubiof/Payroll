<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Payroll Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#f0f2f7;display:flex;height:100vh;overflow:hidden;font-size:13px;color:#1B2A4A}
#sb{width:205px;background:#1B2A4A;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid #243558}
.sb-logo h1{color:#fff;font-size:13px;font-weight:600;line-height:1.4}

.sb-sect{padding:10px 8px 4px}
.sb-lbl{color:#3D5580;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:0 8px 5px;display:block}
.nav{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;color:#6B82A8;font-size:12px;margin-bottom:1px;transition:all .15s;white-space:nowrap}
.nav:hover{background:#243558;color:#C8D8F0}

.sb-period{background:#243558;border-radius:8px;padding:10px 12px}
.sb-period label{color:#5A7099;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px}
.sb-period select{width:100%;background:#1B2A4A;border:1px solid #3D5580;border-radius:4px;color:#C8D8F0;font-size:12px;padding:5px 8px;cursor:pointer;outline:none}
#mn{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tb{background:#fff;border-bottom:1px solid #E0E6F0;padding:0 22px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-l{display:flex;align-items:center;gap:10px}
.tb-title{font-size:15px;font-weight:600;color:#1B2A4A}
.tb-sub{font-size:11px;color:#8BA3C7;background:#EEF1F8;padding:2px 8px;border-radius:10px}
.tb-r{display:flex;align-items:center;gap:8px}
#ct{flex:1;overflow-y:auto;padding:22px}
.sec{display:none}
.sec.on{display:block}
.btn{padding:6px 13px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:5px;line-height:1.4}
.btn-p{background:#1B2A4A;color:#fff}
.btn-p:hover{background:#243558}
.btn-o{background:#fff;color:#1B2A4A;border:1px solid #C5D0E0}
.btn-o:hover{background:#EEF1F8}
.btn-d{background:#FEF3F2;color:#A32D2D;border:1px solid #F7C1C1}
.btn-d:hover{background:#fee}
.btn-g{background:#E8F5E9;color:#2E7D32;border:1px solid #A5D6A7}
.btn-warn{background:#FFF3E0;color:#E65100;border:1px solid #FFCC80}
.btn-sm{padding:3px 8px;font-size:11px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kc{background:#fff;border:1px solid #E0E6F0;border-radius:10px;padding:14px 16px}
.kc.warn{border-color:#F7C1C1;background:#FEF3F2}
.kc.ok{border-color:#A5D6A7;background:#E8F5E9}
.kl{font-size:10px;color:#6B82A8;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.kv{font-size:22px;font-weight:700;color:#1B2A4A;line-height:1}
.kc.warn .kv{color:#A32D2D}
.kc.ok .kv{color:#2E7D32}
.ks{font-size:11px;color:#8BA3C7;margin-top:3px}
.card{background:#fff;border:1px solid #E0E6F0;border-radius:10px;padding:18px;margin-bottom:16px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-ti{font-size:13px;font-weight:600;color:#1B2A4A}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#F4F6FB;color:#6B82A8;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:8px 11px;text-align:left;border-bottom:1px solid #E0E6F0;white-space:nowrap;position:sticky;top:0}
td{padding:7px 11px;border-bottom:1px solid #F0F3F8;color:#1B2A4A;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFBFE}
tr.ov td{background:#FEF3F2}
tr.ed td{background:#F0F8FF}
tr.del-row{opacity:.4}
tr.del-row td{text-decoration:line-through}
tfoot td{font-weight:600;background:#F4F6FB;border-top:2px solid #E0E6F0;border-bottom:none}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.b-ft{background:#EEF1F8;color:#1B2A4A}
.b-pt{background:#F1EFE8;color:#5F5E5A}
.b-reg{background:#E8F5E9;color:#1B5E20}
.b-15{background:#FFF3E0;color:#E65100}
.b-2x{background:#FCE4EC;color:#880E4F}
.tog{position:relative;display:inline-block;width:32px;height:17px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.tog .sl{position:absolute;cursor:pointer;inset:0;background:#C8D0DC;border-radius:17px;transition:.2s}
.tog .sl::before{content:'';position:absolute;width:11px;height:11px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.tog input:checked+.sl{background:#1B2A4A}
.tog.red input:checked+.sl{background:#C62828}
.tog input:checked+.sl::before{transform:translateX(15px)}
.hm-wrap{overflow-x:auto;padding-bottom:4px}
.hm-table{border-collapse:separate;border-spacing:3px;font-size:10px}
.hm-table th{background:none;border:none;font-size:9px;padding:1px 3px;text-align:center;color:#8BA3C7;position:static}
.hm-table td{padding:0;border:none;background:none}
.hm-cell{width:18px;height:18px;border-radius:2px;display:block;cursor:default}
.hm0{background:#EEF1F8}
.hm1{background:#B5D4F4}
.hm2{background:#378ADD}
.hm3{background:#185FA5}
.hm4{background:#1B2A4A}
.hm-name{font-size:10px;white-space:nowrap;text-align:right!important;padding-right:6px!important;color:#1B2A4A;font-weight:500}
.bar-wrap{margin-top:6px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-label{font-size:11px;color:#1B2A4A;width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right;flex-shrink:0}
.bar-track{flex:1;background:#EEF1F8;border-radius:4px;height:13px;min-width:0}
.bar-fill{height:100%;border-radius:4px;background:#1B2A4A;transition:width .4s}
.bar-val{font-size:11px;color:#6B82A8;width:130px;flex-shrink:0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:#fff;border-radius:12px;padding:22px;width:460px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-size:14px;font-weight:600;color:#1B2A4A;margin-bottom:14px}
.frow{margin-bottom:11px}
.frow label{display:block;font-size:11px;color:#6B82A8;margin-bottom:3px;font-weight:500}
.frow input,.frow select,.frow textarea{width:100%;padding:7px 10px;border:1px solid #D0D9E8;border-radius:6px;font-size:12px;color:#1B2A4A;outline:none}
.frow input:focus,.frow select:focus{border-color:#1B2A4A}
.frow textarea{height:72px;resize:vertical}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;flex-wrap:wrap}
#toast{position:fixed;bottom:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.ti{padding:9px 14px;border-radius:7px;font-size:12px;font-weight:500;max-width:280px;animation:sIn .2s ease}
.tok{background:#1B2A4A;color:#fff}
.terr{background:#A32D2D;color:#fff}
.twarn{background:#E65100;color:#fff}
@keyframes sIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}
.wi{color:#E65100;font-size:12px;cursor:pointer}
.empty{text-align:center;padding:48px;color:#8BA3C7}
.empty-ico{font-size:36px;margin-bottom:10px}
.empty p{font-size:13px;line-height:1.6}
.legend{display:flex;gap:10px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#6B82A8}
.leg-dot{width:11px;height:11px;border-radius:2px;flex-shrink:0}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-hd h2{font-size:15px;font-weight:600;color:#1B2A4A}
.tbl-wrap{overflow-x:auto}
.rate-info{background:#EEF1F8;border-radius:8px;padding:12px 16px;font-size:12px;color:#6B82A8;line-height:1.7}
.rate-info strong{color:#1B2A4A}
.divider{height:1px;background:#F0F3F8;margin:14px 0}
@media print{#sb,#toast,.btn,.tb-r{display:none!important}#mn{overflow:visible}#ct{overflow:visible;padding:8px}.sec{display:block!important}.card{break-inside:avoid}}
</style>
</head>
<body>
<aside id="sb">
  <div class="sb-logo">
    <h1>Payroll Dashboard</h1>
    <p>Auxiliares — Airbnb</p>
  </div>
  <div class="sb-sect">
    <span class="sb-lbl">Main</span>
    <div class="nav on" data-sec="overview"><span class="nav-ico">◉</span>Overview</div>
    <div class="nav" data-sec="rawdata"><span class="nav-ico">≡</span>Raw Data</div>
  </div>
  <div class="sb-sect">
    <span class="sb-lbl">Reports</span>
    <div class="nav" data-sec="performance"><span class="nav-ico">★</span>Performance</div>
    <div class="nav" data-sec="costcenter"><span class="nav-ico">$</span>Cost Centers</div>
  </div>
  <div class="sb-sect">
    <span class="sb-lbl">Setup</span>
    <div class="nav" data-sec="employees"><span class="nav-ico">◎</span>Employees</div>
    <div class="nav" data-sec="holidays"><span class="nav-ico">✦</span>Holidays</div>
    <div class="nav" data-sec="export"><span class="nav-ico">↓</span>Export</div>
  </div>
  <div class="sb-footer">
    <div class="sb-period">
      <label>Period</label>
      <select id="period-sel" onchange="setPeriod(this.value)">
        <option value="">All time</option>
      </select>
    </div>
  </div>
</aside>

<main id="mn">
  <div class="tb">
    <div class="tb-l">
      <span class="tb-title" id="tb-title">Overview</span>
      <span class="tb-sub" id="tb-sub">All time</span>
    </div>
    <div class="tb-r">
      <button class="btn btn-o" onclick="loadFromSheets()" id="load-btn">⟳ Sync Sheets</button>
      <button class="btn btn-o" onclick="showPasteCSV()" title="Paste CSV manually">📋 Paste CSV</button>
      <button class="btn btn-p" onclick="navigate('export')">↓ Export</button>
    </div>
  </div>
  <div id="ct">
    <div class="sec on" id="sec-overview"></div>
    <div class="sec" id="sec-rawdata"></div>
    <div class="sec" id="sec-performance"></div>
    <div class="sec" id="sec-costcenter"></div>
    <div class="sec" id="sec-employees"></div>
    <div class="sec" id="sec-holidays"></div>
    <div class="sec" id="sec-export"></div>
  </div>
</main>

<div id="modal-bg" class="modal-bg" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const SHEET_ID='1l6XtGN_h7k9IKmbwuvoalggDoJABcDhY2E1VNzUVIO4';
const BASE_SALARY=500, BASE_HOURS=240, BASE_RATE=BASE_SALARY/BASE_HOURS;

const EC_HOL=[
  {date:'2023-01-01',name:'Año Nuevo'},{date:'2023-02-20',name:'Carnaval'},{date:'2023-02-21',name:'Carnaval'},
  {date:'2023-04-06',name:'Jueves Santo'},{date:'2023-04-07',name:'Viernes Santo'},{date:'2023-05-01',name:'Día del Trabajo'},
  {date:'2023-05-24',name:'Batalla de Pichincha'},{date:'2023-08-10',name:'Grito de Independencia'},
  {date:'2023-10-09',name:'Independencia de Guayaquil'},{date:'2023-11-02',name:'Día de Difuntos'},
  {date:'2023-11-03',name:'Independencia de Cuenca'},{date:'2023-12-25',name:'Navidad'},
  {date:'2024-01-01',name:'Año Nuevo'},{date:'2024-02-12',name:'Carnaval'},{date:'2024-02-13',name:'Carnaval'},
  {date:'2024-03-28',name:'Jueves Santo'},{date:'2024-03-29',name:'Viernes Santo'},{date:'2024-05-01',name:'Día del Trabajo'},
  {date:'2024-05-24',name:'Batalla de Pichincha'},{date:'2024-08-12',name:'Grito de Independencia'},
  {date:'2024-10-09',name:'Independencia de Guayaquil'},{date:'2024-11-04',name:'Día de Difuntos'},
  {date:'2024-11-04',name:'Independencia de Cuenca'},{date:'2024-12-25',name:'Navidad'},
  {date:'2025-01-01',name:'Año Nuevo'},{date:'2025-03-03',name:'Carnaval'},{date:'2025-03-04',name:'Carnaval'},
  {date:'2025-04-17',name:'Jueves Santo'},{date:'2025-04-18',name:'Viernes Santo'},{date:'2025-05-01',name:'Día del Trabajo'},
  {date:'2025-05-26',name:'Batalla de Pichincha'},{date:'2025-08-11',name:'Grito de Independencia'},
  {date:'2025-10-09',name:'Independencia de Guayaquil'},{date:'2025-11-03',name:'Día de Difuntos'},
  {date:'2025-11-03',name:'Independencia de Cuenca'},{date:'2025-12-25',name:'Navidad'},
  {date:'2026-01-01',name:'Año Nuevo'},{date:'2026-02-16',name:'Carnaval'},{date:'2026-02-17',name:'Carnaval'},
  {date:'2026-04-02',name:'Jueves Santo'},{date:'2026-04-03',name:'Viernes Santo'},{date:'2026-05-01',name:'Día del Trabajo'},
  {date:'2026-05-25',name:'Batalla de Pichincha'},{date:'2026-08-10',name:'Grito de Independencia'},
  {date:'2026-10-09',name:'Independencia de Guayaquil'},{date:'2026-11-02',name:'Día de Difuntos'},
  {date:'2026-11-03',name:'Independencia de Cuenca'},{date:'2026-12-25',name:'Navidad'},
];

let S={records:[],roster:{},holidays:[...EC_HOL],period:'',section:'overview'};

// ── STORAGE ──
function save(){
  try{
    localStorage.setItem('pd_r',JSON.stringify(S.records));
    localStorage.setItem('pd_ro',JSON.stringify(S.roster));
    localStorage.setItem('pd_h',JSON.stringify(S.holidays));
  }catch(e){toast('Storage nearly full — export a backup JSON!','warn');}
}
function loadStore(){
  try{
    const r=localStorage.getItem('pd_r'),ro=localStorage.getItem('pd_ro'),h=localStorage.getItem('pd_h');
    if(r)S.records=JSON.parse(r);
    if(ro)S.roster=JSON.parse(ro);
    if(h)S.holidays=JSON.parse(h);
  }catch(e){console.error(e);}
}

// ── TIME/DATE ──
function parseTime(s){
  if(!s)return null;
  const m=String(s).trim().match(/(\d+):(\d+)(?::\d+)?\s*(AM|PM)?/i);
  if(!m)return null;
  let h=parseInt(m[1]);const mn=m[2],ap=(m[3]||'').toUpperCase();
  if(ap==='PM'&&h!==12)h+=12;
  if(ap==='AM'&&h===12)h=0;
  return String(h).padStart(2,'0')+':'+mn;
}
function parseDate(s){
  if(!s)return null;
  const m=String(s).trim().match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  return m?`${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`:null;
}
function hDiff(t1,t2){
  const[h1,m1]=t1.split(':').map(Number),[h2,m2]=t2.split(':').map(Number);
  let ms=(h2*60+m2)-(h1*60+m1);
  if(ms<0)ms+=1440;
  return parseFloat((ms/60).toFixed(4));
}
function fmt(d){if(!d)return'';const[y,m,dd]=d.split('-');return`${dd}/${m}/${y}`;}
function monthLabel(ym){
  if(!ym)return'All time';
  const[y,m]=ym.split('-');
  return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1]+' '+y;
}
function fC(n){return'$'+parseFloat(n).toFixed(2);}
function fH(n){return parseFloat(n).toFixed(2)+'h';}
function firstName(n){return(n||'').split(' ')[0];}

// ── PAYROLL ──
function isHoliday(date){return S.holidays.some(h=>h.date===date);}
function calcRecord(r){
  if(r.del)return{hours:0,pay:0,otType:'del'};
  const hours=hDiff(r.in,r.out);
  if(hours<=0)return{hours:0,pay:0,otType:'err'};
  const rate=BASE_RATE;
  const hol=isHoliday(r.date);
  let pay,otType;
  if(r.ot2x||hol||r.dayoff){
    pay=hours*rate*2;
    otType=r.ot2x?'2x':hol?'2x-hol':'2x-off';
  }else{
    const reg=Math.min(hours,8),ot=Math.max(0,hours-8);
    pay=reg*rate+ot*rate*1.5;
    otType=ot>0?'1.5x':'regular';
  }
  return{hours,pay,otType};
}
function otBadge(r){
  const{otType}=calcRecord(r);
  if(otType==='del')return'<span class="badge" style="background:#fee;color:#A32D2D">DEL</span>';
  if(otType.startsWith('2x'))return'<span class="badge b-2x">2×</span>';
  if(otType==='1.5x')return'<span class="badge b-15">1.5×</span>';
  return'<span class="badge b-reg">Reg</span>';
}

// ── FILTERED RECORDS ──
function filtered(inclDel=false){
  return S.records.filter(r=>{
    if(!inclDel&&r.del)return false;
    if(S.period&&!r.date.startsWith(S.period))return false;
    return true;
  });
}

// ── CSV FETCH ──
async function loadFromSheets(){
  const btn=document.getElementById('load-btn');
  btn.disabled=true;btn.textContent='⟳ Loading...';
  const directUrl=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&cachebust=${Date.now()}`;
  const proxyUrls=[
    directUrl,
    `https://corsproxy.io/?${encodeURIComponent(directUrl)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(directUrl)}`
  ];
  let lastErr='';
  for(let i=0;i<proxyUrls.length;i++){
    try{
      btn.textContent=i===0?'⟳ Loading...':`⟳ Retry ${i}/${proxyUrls.length-1}...`;
      const res=await fetch(proxyUrls[i],{redirect:'follow'});
      if(!res.ok){lastErr=`HTTP ${res.status}`;continue;}
      const text=await res.text();
      if(!text||text.length<20){lastErr='Empty response';continue;}
      if(text.toLowerCase().includes('<html')&&text.toLowerCase().includes('sign in')){
        lastErr='Sheet is not publicly shared';continue;
      }
      const rows=parseCSV(text);
      if(!rows.length){lastErr='No valid rows found in CSV';continue;}
      const added=mergeRecords(rows);
      updateRoster(rows);
      detectOverlaps();save();populatePeriods();refresh();
      toast(`Synced: ${rows.length} rows, ${added} new records.`,'ok');
      btn.disabled=false;btn.textContent='⟳ Sync Sheets';
      return;
    }catch(e){lastErr=e.message||'Network error';}
  }
  showSyncErrorModal(lastErr);
  btn.disabled=false;btn.textContent='⟳ Sync Sheets';
}

function showSyncErrorModal(err){
  showModal(`<h3>⚠ Could not sync from Google Sheets</h3>
    <p style="font-size:12px;color:#A32D2D;background:#FEF3F2;padding:8px 12px;border-radius:6px;margin-bottom:14px">Error: ${err||'Unknown'}</p>
    <p style="font-size:12px;color:#1B2A4A;line-height:1.7;margin-bottom:12px"><strong>Possible causes & fixes:</strong></p>
    <ol style="font-size:12px;color:#1B2A4A;line-height:1.8;padding-left:20px;margin-bottom:14px">
      <li><strong>Sheet not public.</strong> Open the sheet → Share → "Anyone with the link" → Viewer.</li>
      <li><strong>Preview environment limits.</strong> The Claude preview iframe may block external fetches. Once you deploy to GitHub Pages, sync should work.</li>
      <li><strong>CORS issue.</strong> The fallback proxies were also tried and failed.</li>
    </ol>
    <p style="font-size:12px;color:#1B2A4A;line-height:1.6;margin-bottom:12px"><strong>Workaround:</strong> Use <em>📋 Paste CSV</em> to load data manually until deployed.</p>
    <div class="modal-actions">
      <button class="btn btn-o" onclick="closeModal()">Close</button>
      <button class="btn btn-p" onclick="closeModal();showPasteCSV()">📋 Paste CSV instead</button>
    </div>`);
}

function showPasteCSV(){
  showModal(`<h3>📋 Paste CSV Data</h3>
    <p style="font-size:12px;color:#8BA3C7;line-height:1.6;margin-bottom:10px">
      In Google Sheets: <strong>File → Download → Comma-separated values (.csv)</strong>, then open with Notepad/TextEdit and paste here.<br>
      Or copy directly from the sheet (Ctrl+A, Ctrl+C).
    </p>
    <div class="frow"><label>CSV / TSV content (with header row)</label>
      <textarea id="paste-csv" style="height:240px;font-family:monospace;font-size:11px" placeholder="Timestamp,Auxiliar,Hora de Ingreso,Hora de Salida,Lugar de Trabajo,..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-o" onclick="closeModal()">Cancel</button>
      <button class="btn btn-p" onclick="processPastedCSV()">Import</button>
    </div>`);
}

function processPastedCSV(){
  let txt=document.getElementById('paste-csv').value.trim();
  if(!txt)return toast('Paste some content first','err');
  if(txt.includes('\t')&&!txt.split('\n')[0].includes(','))txt=txt.replace(/\t/g,',');
  const rows=parseCSV(txt);
  if(!rows.length)return toast('No valid rows parsed. Check that header row is included.','err');
  const added=mergeRecords(rows);
  updateRoster(rows);
  detectOverlaps();save();populatePeriods();closeModal();refresh();
  toast(`Imported ${rows.length} rows, ${added} new.`,'ok');
}

function parseCSVLine(line){
  const cols=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){cols.push(cur);cur='';}
    else cur+=c;
  }
  cols.push(cur);return cols;
}

function parseCSV(text){
  const lines=text.split('\n').map(l=>l.trimEnd()).filter(l=>l);
  if(lines.length<2)return[];
  const hdrs=parseCSVLine(lines[0]).map(h=>h.trim().replace(/^"|"$/g,''));
  const ci=(name)=>hdrs.findIndex(h=>h.toLowerCase().includes(name.toLowerCase()));
  const iTs=ci('Timestamp'),iAux=ci('Auxiliar'),iIn=ci('Ingreso'),iOut=ci('Salida'),iLoc=ci('Lugar'),iDmg=ci('daño'),iNotes=ci('Novedad');
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const v=parseCSVLine(lines[i]).map(s=>s.trim().replace(/^"|"$/g,''));
    const ts=v[iTs]||'',aux=(v[iAux]||'').trim();
    const inT=parseTime(v[iIn]),outT=parseTime(v[iOut]);
    if(!ts||!aux||!inT||!outT)continue;
    const date=parseDate(ts);if(!date)continue;
    const loc=(v[iLoc]||'').trim();
    const id=`${date}|${aux}|${inT}|${outT}`.replace(/\s/g,'');
    rows.push({id,date,aux,in:inT,out:outT,loc,
      dmg:iDmg>=0?v[iDmg]:'',notes:iNotes>=0?v[iNotes]:'',
      ot2x:false,dayoff:false,del:false,edited:false,flagOverlap:false,accepted:false});
  }
  return rows;
}

function mergeRecords(rows){
  const ex=new Set(S.records.map(r=>r.id));
  let added=0;
  rows.forEach(r=>{if(!ex.has(r.id)){S.records.push(r);ex.add(r.id);added++;}});
  return added;
}
function updateRoster(rows){
  rows.forEach(r=>{if(r.aux&&!S.roster[r.aux])S.roster[r.aux]={type:'FT',salary:500};});
}
function detectOverlaps(){
  S.records.forEach(r=>r.flagOverlap=false);
  const grp={};
  S.records.filter(r=>!r.del).forEach(r=>{
    const k=r.aux+'|'+r.date;(grp[k]=grp[k]||[]).push(r);
  });
  Object.values(grp).forEach(g=>{
    if(g.length<2)return;
    g.sort((a,b)=>a.in.localeCompare(b.in));
    for(let i=0;i<g.length-1;i++){
      if(g[i].out>g[i+1].in&&!g[i].accepted&&!g[i+1].accepted){g[i].flagOverlap=true;g[i+1].flagOverlap=true;}
    }
  });
}

// ── ROW ACTIONS ──
function toggleOT2x(id){
  const r=S.records.find(r=>r.id===id);
  if(r){r.ot2x=!r.ot2x;r.edited=true;save();refresh();}
}
function deleteRow(id){
  const r=S.records.find(r=>r.id===id);
  if(r&&confirm(`Delete record for ${firstName(r.aux)} on ${fmt(r.date)}?`)){
    r.del=true;detectOverlaps();save();refresh();toast('Record deleted','ok');
  }
}
function restoreRow(id){
  const r=S.records.find(r=>r.id===id);
  if(r){r.del=false;detectOverlaps();save();refresh();toast('Record restored','ok');}
}
function resolveOverlap(id){
  const r=S.records.find(r=>r.id===id);if(!r)return;
  showModal(`<h3>⚠ Overlapping Shift — ${firstName(r.aux)}</h3>
    <p style="font-size:12px;color:#8BA3C7;margin-bottom:8px">${fmt(r.date)} &nbsp; ${r.in} → ${r.out}</p>
    <p style="font-size:12px;color:#8BA3C7;margin-bottom:14px">Location: ${r.loc||'—'}</p>
    <p style="font-size:12px;color:#1B2A4A;line-height:1.6">This shift overlaps with another entry for this employee on the same day. How would you like to handle it?</p>
    <div class="modal-actions">
      <button class="btn btn-o" onclick="editRow('${id.replace(/'/g,"\\'")}')">✎ Edit Times</button>
      <button class="btn btn-g" onclick="acceptOverlap('${id.replace(/'/g,"\\'")}')">✓ Accept as-is</button>
      <button class="btn btn-d" onclick="closeModal();deleteRow('${id.replace(/'/g,"\\'")}')">✕ Delete</button>
    </div>`);
}
function acceptOverlap(id){
  const r=S.records.find(r=>r.id===id);
  if(r){r.accepted=true;r.flagOverlap=false;detectOverlaps();save();closeModal();refresh();toast('Overlap accepted','ok');}
}
function editRow(id){
  const r=S.records.find(r=>r.id===id);if(!r)return;
  closeModal();
  showModal(`<h3>Edit Record</h3>
    <div class="frow"><label>Date</label><input type="date" id="e-date" value="${r.date}"></div>
    <div class="frow"><label>Employee</label><input type="text" id="e-aux" value="${r.aux}"></div>
    <div class="frow"><label>Clock In</label><input type="time" id="e-in" value="${r.in}"></div>
    <div class="frow"><label>Clock Out</label><input type="time" id="e-out" value="${r.out}"></div>
    <div class="frow"><label>Location</label><input type="text" id="e-loc" value="${r.loc||''}"></div>
    <div class="frow"><label>Notes</label><textarea id="e-notes">${r.notes||''}</textarea></div>
    <div class="modal-actions">
      <button class="btn btn-o" onclick="closeModal()">Cancel</button>
      <button class="btn btn-p" onclick="saveEdit('${id.replace(/'/g,"\\'")}')">Save Changes</button>
    </div>`);
}
function saveEdit(id){
  const r=S.records.find(r=>r.id===id);if(!r)return;
  r.date=document.getElementById('e-date').value;
  r.aux=document.getElementById('e-aux').value.trim();
  r.in=document.getElementById('e-in').value;
  r.out=document.getElementById('e-out').value;
  r.loc=document.getElementById('e-loc').value.trim();
  r.notes=document.getElementById('e-notes').value.trim();
  r.edited=true;r.accepted=false;
  detectOverlaps();save();closeModal();refresh();toast('Record updated','ok');
}
function showAddModal(){
  const empOpts=Object.keys(S.roster).map(n=>`<option>${n}</option>`).join('');
  showModal(`<h3>Add Record</h3>
    <div class="frow"><label>Date</label><input type="date" id="a-date" value="${new Date().toISOString().split('T')[0]}"></div>
    <div class="frow"><label>Employee</label><select id="a-aux">${empOpts||'<option>Add employees first</option>'}</select></div>
    <div class="frow"><label>Clock In</label><input type="time" id="a-in" value="08:00"></div>
    <div class="frow"><label>Clock Out</label><input type="time" id="a-out" value="16:00"></div>
    <div class="frow"><label>Location (Listing)</label><input type="text" id="a-loc" placeholder="Lugar de Trabajo"></div>
    <div class="modal-actions">
      <button class="btn btn-o" onclick="closeModal()">Cancel</button>
      <button class="btn btn-p" onclick="addRow()">Add Record</button>
    </div>`);
}
function addRow(){
  const date=document.getElementById('a-date').value;
  const aux=document.getElementById('a-aux').value;
  const inT=document.getElementById('a-in').value;
  const outT=document.getElementById('a-out').value;
  const loc=document.getElementById('a-loc').value.trim();
  if(!date||!aux||!inT||!outT)return toast('Fill all required fields','err');
  const id=`${date}|${aux}|${inT}|M${Date.now()}`.replace(/\s/g,'');
  S.records.push({id,date,aux,in:inT,out:outT,loc,dmg:'',notes:'',ot2x:false,dayoff:false,del:false,edited:true,flagOverlap:false,accepted:false});
  detectOverlaps();save();closeModal();refresh();toast('Record added','ok');
}

// ── EMPLOYEE ACTIONS ──
function toggleEmpType(aux){
  if(S.roster[aux]){S.roster[aux].type=S.roster[aux].type==='FT'?'PT':'FT';save();renderEmployees();}
}
function editEmployee(aux){
  const e=S.roster[aux]||{type:'FT',salary:500};
  showModal(`<h3>Edit Employee</h3>
    <div class="frow"><label>Full Name</label><input type="text" id="ee-n" value="${aux}"></div>
    <div class="frow"><label>Type</label><select id="ee-t"><option value="FT"${e.type==='FT'?' selected':''}>Full Time</option><option value="PT"${e.type==='PT'?' selected':''}>Part Time</option></select></div>
    <div class="frow"><label>Monthly Salary (USD)</label><input type="number" id="ee-s" value="${e.salary||500}" step="10" min="0"></div>
    <div class="modal-actions">
      <button class="btn btn-o" onclick="closeModal()">Cancel</button>
      <button class="btn btn-p" onclick="saveEmployee('${aux.replace(/'/g,"\\'")}')">Save</button>
    </div>`);
}
function saveEmployee(old){
  const name=document.getElementById('ee-n').value.trim();
  const type=document.getElementById('ee-t').value;
  const sal=parseFloat(document.getElementById('ee-s').value)||500;
  if(!name)return toast('Name required','err');
  if(name!==old){
    S.roster[name]={...S.roster[old],type,salary:sal};
    delete S.roster[old];
    S.records.filter(r=>r.aux===old).forEach(r=>r.aux=name);
  }else S.roster[name]={type,salary:sal};
  save();closeModal();renderEmployees();toast('Employee updated','ok');
}
function showAddEmpModal(){
  showModal(`<h3>Add Employee</h3>
    <div class="frow"><label>Full Name</label><input type="text" id="ne-n" placeholder="e.g. Jennifer Muñoz"></div>
    <div class="frow"><label>Type</label><select id="ne-t"><option value="FT">Full Time</option><option value="PT">Part Time</option></select></div>
    <div class="frow"><label>Monthly Salary (USD)</label><input type="number" id="ne-s" value="500" step="10" min="0"></div>
    <div class="modal-actions">
      <button class="btn btn-o" onclick="closeModal()">Cancel</button>
      <button class="btn btn-p" onclick="addEmployee()">Add</button>
    </div>`);
}
function addEmployee(){
  const name=document.getElementById('ne-n').value.trim();
  const type=document.getElementById('ne-t').value;
  const sal=parseFloat(document.getElementById('ne-s').value)||500;
  if(!name)return toast('Name required','err');
  S.roster[name]={type,salary:sal};save();closeModal();renderEmployees();toast('Employee added','ok');
}
function removeEmployee(aux){
  if(confirm(`Remove ${aux} from roster? Records will be kept.`)){
    delete S.roster[aux];save();renderEmployees();toast('Removed from roster','ok');
  }
}

// ── HOLIDAY ACTIONS ──
function showAddHolModal(){
  showModal(`<h3>Add Holiday</h3>
    <div class="frow"><label>Date</label><input type="date" id="h-d"></div>
    <div class="frow"><label>Holiday Name</label><input type="text" id="h-n" placeholder="e.g. Feriado Local"></div>
    <div class="modal-actions">
      <button class="btn btn-o" onclick="closeModal()">Cancel</button>
      <button class="btn btn-p" onclick="addHoliday()">Add</button>
    </div>`);
}
function addHoliday(){
  const date=document.getElementById('h-d').value;
  const name=document.getElementById('h-n').value.trim();
  if(!date||!name)return toast('Date and name required','err');
  if(S.holidays.some(h=>h.date===date&&h.name===name))return toast('Already exists','warn');
  S.holidays.push({date,name});S.holidays.sort((a,b)=>a.date.localeCompare(b.date));
  save();closeModal();renderHolidays();toast('Holiday added','ok');
}
function removeHoliday(date,name){
  if(confirm(`Remove "${name}"?`)){
    S.holidays=S.holidays.filter(h=>!(h.date===date&&h.name===name));
    save();renderHolidays();toast('Holiday removed','ok');
  }
}

// ── EXPORT FUNCTIONS ──
function exportExcel(){
  if(typeof XLSX==='undefined')return toast('XLSX library not loaded yet','err');
  const wb=XLSX.utils.book_new();
  const recs=filtered();
  const raw=recs.map(r=>{const c=calcRecord(r);return{Date:fmt(r.date),Employee:r.aux,'Clock In':r.in,'Clock Out':r.out,Hours:+c.hours.toFixed(2),Location:r.loc,'OT Type':c.otType,'Day Off 2x':r.ot2x?'Yes':'No','Pay USD':+c.pay.toFixed(2),Damage:r.dmg||'',Notes:r.notes||''};});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(raw),'Raw Data');
  const empMap={};
  recs.forEach(r=>{if(!empMap[r.aux])empMap[r.aux]={shifts:0,hours:0,pay:0};const c=calcRecord(r);empMap[r.aux].shifts++;empMap[r.aux].hours+=c.hours;empMap[r.aux].pay+=c.pay;});
  const empData=Object.entries(empMap).map(([aux,d])=>({Employee:aux,Type:(S.roster[aux]||{type:'FT'}).type,Shifts:d.shifts,'Total Hours':+d.hours.toFixed(2),'Avg Hrs/Shift':+(d.hours/d.shifts).toFixed(2),'Total Pay USD':+d.pay.toFixed(2)})).sort((a,b)=>b['Total Pay USD']-a['Total Pay USD']);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(empData),'Employees');
  const ccMap={};
  recs.forEach(r=>{const l=r.loc||'Unassigned';if(!ccMap[l])ccMap[l]={shifts:0,hours:0,pay:0};const c=calcRecord(r);ccMap[l].shifts++;ccMap[l].hours+=c.hours;ccMap[l].pay+=c.pay;});
  const ccData=Object.entries(ccMap).map(([loc,d])=>({Location:loc,Shifts:d.shifts,'Total Hours':+d.hours.toFixed(2),'Total Pay USD':+d.pay.toFixed(2)})).sort((a,b)=>b['Total Pay USD']-a['Total Pay USD']);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(ccData),'Cost Centers');
  XLSX.writeFile(wb,`payroll_${S.period||'all'}_${new Date().toISOString().split('T')[0]}.xlsx`);
  toast('Excel downloaded!','ok');
}
function exportJSON(){
  const blob=new Blob([JSON.stringify({records:S.records,roster:S.roster,holidays:S.holidays,exported:new Date().toISOString()},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`payroll_backup_${new Date().toISOString().split('T')[0]}.json`;a.click();
  toast('Backup exported','ok');
}
function importJSON(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.records)S.records=d.records;
        if(d.roster)S.roster=d.roster;
        if(d.holidays)S.holidays=d.holidays;
        detectOverlaps();save();populatePeriods();refresh();
        toast(`Imported: ${S.records.length} records`,'ok');
      }catch(e){toast('Invalid JSON file','err');}
    };reader.readAsText(file);
  };inp.click();
}

// ── MODAL ──
function showModal(html){document.getElementById('modal').innerHTML=html;document.getElementById('modal-bg').style.display='flex';}
function closeModal(){document.getElementById('modal-bg').style.display='none';}

// ── TOAST ──
function toast(msg,type='ok'){
  const t=document.getElementById('toast');
  const el=document.createElement('div');
  el.className=`ti t${type==='err'?'err':type==='warn'?'warn':'ok'}`;
  el.textContent=msg;t.appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

// ── NAV CLICKS ──
document.querySelectorAll('.nav').forEach(n=>n.addEventListener('click',()=>navigate(n.dataset.sec)));

// ── INIT ──
function init(){
  loadStore();
  detectOverlaps();
  populatePeriods();
  const months=[...new Set(S.records.map(r=>r.date.substring(0,7)))].sort();
  if(months.length){
    const cur=new Date().toISOString().substring(0,7);
    S.period=months.includes(cur)?cur:months[months.length-1];
    document.getElementById('period-sel').value=S.period;
  }
  navigate('overview');
}
init();
</script>
